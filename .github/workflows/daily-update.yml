name: Daily Ring Price Update

on:
  schedule:
    # 8:07am ET (13:07 UTC) every day — off the :00 mark to reduce API load spikes
    - cron: '7 13 * * *'
  workflow_dispatch:
    # Allow manual trigger from the GitHub Actions tab

permissions:
  contents: write   # needed to push the updated output/ files

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch prices and regenerate table
        run: node src/update-prices.js
        env:
          STULLER_USER: ${{ secrets.STULLER_USER }}
          STULLER_PASS: ${{ secrets.STULLER_PASS }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          # Only commit if something actually changed
          git diff --staged --quiet || git commit -m "chore: update ring prices [$(date -u +%Y-%m-%d)]"
          git push
